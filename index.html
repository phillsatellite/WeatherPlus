<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets the hero extend under the iOS notch. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Tints the iOS status bar to match the hero. -->
    <meta name="theme-color" content="#8fb4d9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Weather Unlimited</title>
  </head>
  <body>
    <!-- React mounts into this div. -->
    <div id="root"></div>
    <!-- Entry point for the bundler. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
